<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
    <defs>
        <style> .box{fill:#fff;stroke:#111;stroke-width:2} .title{font:700 22px sans-serif;
            fill:#111} .label{font:16px sans-serif; fill:#111} .small{font:14px sans-serif;
            fill:#111} .arrow{stroke:#111; stroke-width:2; marker-end:url(#a)}
            .dashed{stroke-dasharray:6 6} </style>
        <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <path d="M0,0 L10,3 L0,6 Z" fill="#111" />
        </marker>
    </defs> <!-- Title -->
    <text x="600" y="40" text-anchor="middle" class="title">Sighthound Workflow</text>

    <!-- User -->
    <rect x="60" y="90" width="200" height="70" rx="8" class="box" />
    <text x="160" y="130" text-anchor="middle" class="label">User (CLI / API)</text> <!--
    Orchestrator -->
    <rect x="360" y="80" width="260" height="90" rx="8" class="box" />
    <text x="490" y="120" text-anchor="middle" class="label">Python Orchestrator</text> <!-- Arrow
    User -> Orchestrator -->
    <line x1="260" y1="125" x2="360" y2="125" class="arrow" /> <!-- Rust Modules Container -->
    <rect x="360" y="210" width="780" height="210" rx="10" class="box" />
    <text x="750" y="240" text-anchor="middle" class="small">Core Rust Modules</text> <!-- Four Rust
    modules -->
    <rect x="390" y="260" width="220" height="60" rx="8" class="box" />
    <text x="500" y="298" text-anchor="middle" class="label">Filtering</text>
    <rect x="640" y="260" width="220" height="60" rx="8" class="box" />
    <text x="750" y="298" text-anchor="middle" class="label">Triangulation</text>
    <rect x="890" y="260" width="220" height="60" rx="8" class="box" />
    <text x="1000" y="298" text-anchor="middle" class="label">Bayesian + Fuzzy</text>
    <rect x="640" y="340" width="220" height="60" rx="8" class="box" />
    <text x="750" y="378" text-anchor="middle" class="label">Autobahn Integration</text> <!-- Python
    Fallbacks -->
    <rect x="60" y="220" width="240" height="80" rx="8" class="box" />
    <text x="180" y="268" text-anchor="middle" class="label">Python Fallbacks</text> <!--
    Orchestrator -> Fallback dashed -->
    <line x1="490" y1="170" x2="180" y2="220" class="arrow dashed" /> <!-- Orchestrator to Rust
    module arrows -->
    <line x1="490" y1="170" x2="500" y2="260" class="arrow" />
    <line x1="490" y1="170" x2="750" y2="260" class="arrow" />
    <line x1="490" y1="170" x2="1000" y2="260" class="arrow" />
    <line x1="490" y1="170" x2="750" y2="340" class="arrow" /> <!-- Output Generators -->
    <rect x="360" y="470" width="780" height="90" rx="10" class="box" />
    <text x="750" y="498" text-anchor="middle" class="label">Output Generators</text>
    <text x="750" y="525" text-anchor="middle" class="small">GeoJSON • CZML • CSV • JSON</text> <!--
    Arrows modules -> outputs -->
    <line x1="500" y1="320" x2="500" y2="470" class="arrow" />
    <line x1="750" y1="320" x2="750" y2="470" class="arrow" />
    <line x1="1000" y1="320" x2="1000" y2="470" class="arrow" />
    <line x1="750" y1="400" x2="750" y2="470" class="arrow" />
</svg>