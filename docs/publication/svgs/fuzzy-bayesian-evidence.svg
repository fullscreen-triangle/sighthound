<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
    <defs>
        <style> .box{fill:#fff;stroke:#111;stroke-width:2} .label{font:16px sans-serif; fill:#111}
            .title{font:700 20px sans-serif; fill:#111} .arrow{stroke:#111; stroke-width:2;
            marker-end:url(#a)} </style>
        <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <path d="M0,0 L10,3 L0,6 Z" fill="#111" />
        </marker>
    </defs>
    <text x="550" y="30" text-anchor="middle" class="title">Fuzzy-Bayesian Evidence Integration</text>

    <!-- Sensors -->
    <rect x="60" y="90" width="170" height="60" rx="8" class="box" />
    <text x="145" y="125" text-anchor="middle" class="label">Sensor A</text>
    <rect x="60" y="180" width="170" height="60" rx="8" class="box" />
    <text x="145" y="215" text-anchor="middle" class="label">Sensor B</text> <!-- Fuzzy Membership -->
    <rect x="280" y="120" width="200" height="80" rx="8" class="box" />
    <text x="380" y="165" text-anchor="middle" class="label">Fuzzy Membership</text> <!-- Arrows
    sensors -> fuzzy -->
    <line x1="230" y1="120" x2="280" y2="150" class="arrow" />
    <line x1="230" y1="210" x2="280" y2="170" class="arrow" /> <!-- Criteria -->
    <rect x="520" y="70" width="200" height="60" rx="8" class="box" />
    <text x="620" y="105" text-anchor="middle" class="label">Smoothness</text>
    <rect x="520" y="150" width="200" height="60" rx="8" class="box" />
    <text x="620" y="185" text-anchor="middle" class="label">Consistency</text>
    <rect x="520" y="230" width="200" height="60" rx="8" class="box" />
    <text x="620" y="265" text-anchor="middle" class="label">Uncertainty</text> <!-- Fuzzy to
    criteria -->
    <line x1="480" y1="160" x2="520" y2="100" class="arrow" />
    <line x1="480" y1="160" x2="520" y2="180" class="arrow" />
    <line x1="480" y1="160" x2="520" y2="260" class="arrow" /> <!-- Bayesian Update -->
    <rect x="780" y="140" width="220" height="80" rx="8" class="box" />
    <text x="890" y="185" text-anchor="middle" class="label">Bayesian Update</text> <!-- Criteria to
    Bayesian -->
    <line x1="720" y1="100" x2="780" y2="160" class="arrow" />
    <line x1="720" y1="180" x2="780" y2="180" class="arrow" />
    <line x1="720" y1="260" x2="780" y2="200" class="arrow" /> <!-- Posterior -->
    <line x1="1000" y1="180" x2="1040" y2="130" class="arrow" />
    <text x="1048" y="126" class="label">Posterior Beliefs</text>
</svg>